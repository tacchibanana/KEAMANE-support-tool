<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ケアプラン費用＆経営シミュレーター V1.6</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f0fdf4; color: #1a202c; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; border-radius: 20px; border: 2px solid #e2e8f0; padding: 24px; margin-bottom: 24px; }
        input[type="number"], input[type="text"], select { border: 2px solid #cbd5e1; border-radius: 12px; padding: 10px; width: 100%; font-weight: 900; color: #1e293b; }
        input[type="number"] { font-size: 1.5rem; text-align: center; }
        
        /* スクロール設定 */
        .scrollable-items { max-height: 500px; overflow-y: auto; padding-right: 5px; }
        .scrollable-items::-webkit-scrollbar { width: 8px; }
        .scrollable-items::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }

        /* 署名欄スタイル */
        .signature-pad { border: 2px dashed #cbd5e1; background: #fff; touch-action: none; cursor: crosshair; width: 100%; height: 120px; border-radius: 8px; }

        @media print {
            nav, .no-print, button, #settings, #dash, #fixed-footer, .clear-btn { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .card { border: 2px solid #000 !important; box-shadow: none !important; margin: 0 !important; padding: 15px !important; }
            .scrollable-items { max-height: none !important; overflow: visible !important; }
            .print-only { display: block !important; }
            .signature-pad { border: 1px solid #000; }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="p-0 pb-28">

    <nav class="bg-[#0f766e] text-white p-4 sticky top-0 z-50 flex justify-around shadow-xl no-print">
        <button onclick="showTab('calc')" class="text-base font-black">💰 プラン計算</button>
        <button onclick="showTab('dash')" class="text-base font-black">📈 経営分析</button>
        <button onclick="showTab('settings')" class="text-base font-black">⚙️ 設定</button>
    </nav>

    <div class="p-4 max-w-lg mx-auto">
        <div class="print-only mb-8 border-b-4 border-black pb-4 text-center">
            <h1 class="text-3xl font-black">介護サービス ご利用概算見積書</h1>
            <p class="text-right mt-4 font-bold text-lg">作成日: <span id="print-date"></span></p>
        </div>

        <section id="calc" class="tab-content active">
            <div class="flex justify-between items-center mb-6 no-print">
                <h2 class="text-2xl font-black text-[#1e293b]">利用費用を計算する</h2>
                <button onclick="window.print()" class="bg-teal-700 text-white px-6 py-3 rounded-full font-black shadow-lg hover:bg-teal-800 transition-all text-sm">🖨️ 印刷/保存</button>
            </div>
            
            <div class="card shadow-sm p-4">
                <!-- 設定エリア -->
                <div class="grid grid-cols-2 gap-4 mb-4 no-print">
                    <div class="flex flex-col">
                        <label class="text-xs font-bold text-gray-500 mb-1">サービス切替</label>
                        <select id="calc-type" class="p-3 border-2 border-teal-200 bg-teal-50" onchange="renderCalcItems()">
                            <option value="home_help">訪問介護</option>
                            <option value="visit_nursing">訪問看護</option>
                            <option value="visit_rehab">訪問リハビリ</option>
                            <option value="day_care">通所介護</option>
                            <option value="day_rehab">通所リハ</option>
                            <option value="short_stay">短期入所生活介護</option>
                            <option value="welfare_equipment">福祉用具</option>
                        </select>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-xs font-bold text-gray-500 mb-1">負担割合</label>
                        <select id="user-ratio" class="p-3 border-2 border-amber-200 bg-amber-50" onchange="calculate()">
                            <option value="0.1">1割</option>
                            <option value="0.2">2割</option>
                            <option value="0.3">3割</option>
                        </select>
                    </div>
                </div>

                <div class="mb-6 no-print">
                    <label class="text-xs font-bold text-gray-500 mb-1">要介護度（支給限度額）</label>
                    <select id="care-level" class="p-3 border-2 border-indigo-200 bg-indigo-50" onchange="calculate()">
                        <option value="999999">設定しない</option>
                        <option value="5032">要支援1 (5,032)</option>
                        <option value="10531">要支援2 (10,531)</option>
                        <option value="16765">要介護1 (16,765)</option>
                        <option value="19705">要介護2 (19,705)</option>
                        <option value="27048">要介護3 (27,048)</option>
                        <option value="30938">要介護4 (30,938)</option>
                        <option value="36217">要介護5 (36,217)</option>
                    </select>
                </div>

                <!-- 計算アイテムエリア -->
                <div class="bg-slate-50 rounded-2xl mb-6 border-2 border-slate-200 p-4">
                    <div id="service-input-header">
                        <label class="text-base font-black text-slate-800 mb-3 block text-center" id="service-input-label">訪問介護：月間利用回数</label>
                        <div class="flex items-center gap-6 mb-6">
                            <button onclick="adjustVal('input-visit-count', -1)" class="no-print w-12 h-12 bg-white border-2 border-slate-300 rounded-full font-black text-2xl shadow-sm">-</button>
                            <input type="number" id="input-visit-count" value="4" min="0" class="flex-1 text-3xl" oninput="updateVisitCount()">
                            <button onclick="adjustVal('input-visit-count', 1)" class="no-print w-12 h-12 bg-white border-2 border-slate-300 rounded-full font-black text-2xl shadow-sm">+</button>
                        </div>
                    </div>

                    <div id="over-alert-main" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4 rounded font-bold text-sm">⚠️ 支給限度額を超過しています</div>
                    
                    <div class="scrollable-items space-y-6" id="calc-items-container"></div>
                </div>

                <!-- ✍️ 署名エリア -->
                <div class="mt-8 border-t-2 border-slate-200 pt-6">
                    <div class="grid grid-cols-1 gap-6">
                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <label class="text-sm font-black text-slate-700">ご署名（ご本人またはご家族）</label>
                                <button onclick="clearCanvas('sig-user')" class="clear-btn text-[10px] bg-slate-200 px-2 py-1 rounded font-bold">書き直し</button>
                            </div>
                            <canvas id="sig-user" class="signature-pad"></canvas>
                        </div>
                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <label class="text-sm font-black text-slate-700">説明者（ケアマネジャー等）</label>
                                <button onclick="clearCanvas('sig-staff')" class="clear-btn text-[10px] bg-slate-200 px-2 py-1 rounded font-bold">書き直し</button>
                            </div>
                            <canvas id="sig-staff" class="signature-pad"></canvas>
                        </div>
                    </div>
                    <p class="text-[10px] text-gray-400 mt-4 leading-tight">※本見積書は概算であり、実際の請求額は端数処理やサービス提供状況により変動する場合があります。</p>
                </div>
            </div>
        </section>

        <!-- 経営分析タブ（変更なし） -->
        <section id="dash" class="tab-content no-print">
            <h2 class="text-2xl font-black mb-6">居宅経営分析ダッシュボード</h2>
            <div class="grid grid-cols-2 gap-4 mb-6 text-center">
                <div class="bg-white p-6 rounded-3xl shadow-sm border-b-8 border-red-500">
                    <p class="text-[10px] font-black text-gray-400 uppercase">損益分岐点</p>
                    <p class="text-3xl font-black text-slate-800" id="bep-count">0件</p>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border-b-8 border-teal-500">
                    <p class="text-[10px] font-black text-gray-400 uppercase">推奨目標(利益20%)</p>
                    <p class="text-3xl font-black text-teal-600" id="target-count">0件</p>
                </div>
            </div>
            <div class="card space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs font-bold text-teal-600">要支援平均単価</label><input type="number" id="input-light" value="4380" oninput="updateDashboard()"></div>
                    <div><label class="text-xs font-bold text-emerald-600">要介護平均単価</label><input type="number" id="input-heavy" value="10530" oninput="updateDashboard()"></div>
                </div>
                <div>
                    <div class="flex justify-between mb-2 text-sm font-bold"><label>顧客比率 (支援:介護)</label><span id="val-ratio">30%:70%</span></div>
                    <input type="range" id="slide-ratio" min="0" max="100" value="30" class="w-full h-3 bg-gray-200 rounded-lg appearance-none accent-teal-600" oninput="updateDashboard()">
                </div>
                <div><label class="text-xs font-bold text-red-500">月間固定費</label><input type="number" id="input-fixed" value="1200000" oninput="updateDashboard()"></div>
            </div>
            <div class="card"><canvas id="bepChart" height="220"></canvas></div>
        </section>

        <!-- 設定タブ（変更なし） -->
        <section id="settings" class="tab-content no-print">
            <h2 class="text-2xl font-black mb-6">システム設定</h2>
            <div class="card mb-8 border-teal-500 border-4">
                <h3 class="text-lg font-black mb-4">📍 地域単価設定</h3>
                <input type="number" id="care-unit-price" value="10.27" step="0.01" class="text-2xl font-black text-teal-700 bg-teal-50" oninput="calculate()">
            </div>
            <h3 class="text-xl font-black mb-4">➕ マスタ項目追加</h3>
            <div class="card bg-gray-50 border-2 border-dashed">
                <div class="space-y-4">
                    <select id="new-type" class="w-full">
                        <option value="home_help">訪問介護</option>
                        <option value="visit_nursing">訪問看護</option>
                        <option value="visit_rehab">訪問リハビリ</option>
                        <option value="day_care">通所介護</option>
                        <option value="day_rehab">通所リハ</option>
                        <option value="short_stay">短期入所生活介護</option>
                        <option value="welfare_equipment">福祉用具</option>
                    </select>
                    <input type="text" id="new-name" placeholder="名称">
                    <input type="number" id="new-price" placeholder="単位数(または割合。例: 10%は0.1)" step="0.001">
                    <select id="new-logic" class="w-full font-bold text-sm">
                        <option value="base">【限度額内】基本単位 (回数乗算)</option>
                        <option value="monthly">【限度額内】定額加算 (月額)</option>
                        <option value="deduction">【限度額内】減算割合 (基本から減算)</option>
                        <option value="treatment">【限度額外】処遇改善割合</option>
                        <option value="limit_off_base">【限度額外】特定加算 (回数乗算)</option>
                        <option value="limit_off_monthly">【限度額外】特定加算 (月額定額)</option>
                    </select>
                    <button onclick="addItem()" class="w-full bg-teal-600 text-white py-4 rounded-xl font-black">保存</button>
                </div>
            </div>
            <div id="master-list-container" class="mt-8"></div>
        </section>
    </div>

    <!-- 固定フッター -->
    <div id="fixed-footer" class="fixed bottom-0 left-0 w-full bg-slate-900 text-white p-3 z-50 no-print transition-colors duration-300">
        <div class="max-w-lg mx-auto flex justify-between items-center">
            <div class="flex-1">
                <p class="text-xs text-slate-400 font-bold flex gap-2 items-center">
                    管理対象単位 (限度額内)
                    <span id="fixed-alert" class="hidden bg-red-500 text-[10px] px-2 py-0.5 rounded font-black text-white">超過⚠️</span>
                </p>
                <p class="text-2xl font-black" id="fixed-total-units">0 単位</p>
                <p class="text-[10px] text-slate-500 mt-1" id="calc-process">集計中...</p>
            </div>
            <div class="text-right border-l border-slate-700 pl-4 w-32">
                <p class="text-xs text-slate-400 font-bold">自己負担概算</p>
                <p class="text-3xl font-black text-teal-400" id="fixed-user-cost">¥0</p>
            </div>
        </div>
    </div>

    <script>
        // --- 署名機能のロジック ---
        function initSignaturePad(canvasId) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            let drawing = false;

            // キャンバスの解像度設定
            function resize() {
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#000';
            }
            window.addEventListener('resize', resize);
            resize();

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const start = (e) => { drawing = true; draw(e); };
            const end = () => { drawing = false; ctx.beginPath(); };
            const draw = (e) => {
                if (!drawing) return;
                const pos = getPos(e);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            };

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', draw);
            window.addEventListener('mouseup', end);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
            canvas.addEventListener('touchend', end);
        }

        function clearCanvas(id) {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // --- 既存のロジック ---
        let masterData = {
            home_help: [
                { name: '身01', price: 163, logic: 'base', checked: true, visits: 4 },
                { name: '身01早朝夜間', price: 204, logic: 'base', checked: false, visits: 0 },
                { name: '身01深夜', price: 245, logic: 'base', checked: false, visits: 0 },
                { name: '身2', price: 387, logic: 'base', checked: false, visits: 0 },
                { name: '生活2', price: 179, logic: 'base', checked: false, visits: 0 },
                { name: '生活3', price: 220, logic: 'base', checked: false, visits: 0 },
                { name: '通院等昇降介助', price: 97, logic: 'base', checked: false, visits: 0 },
                { name: '同一建物減算1', price: 0.10, logic: 'deduction', checked: false, visits: 0 },
                { name: '初回加算', price: 200, logic: 'monthly', checked: false, visits: 1 },
                { name: '処遇改善1(外)', price: 0.245, logic: 'treatment', checked: false, visits: 1 },
                { name: '特別地域加算(外)', price: 100, logic: 'limit_off_base', checked: false, visits: 0 },
            ],
            visit_nursing: [
                { name: '訪看11', price: 314, logic: 'base', checked: true, visits: 4 },
                { name: '訪看12', price: 471, logic: 'base', checked: false, visits: 0 },
                { name: '緊急時訪問看護加算2(外)', price: 574, logic: 'limit_off_monthly', checked: false, visits: 1 },
                { name: '特別管理加算1(外)', price: 500, logic: 'limit_off_monthly', checked: false, visits: 1 },
                { name: 'ターミナルケア加算(外)', price: 2000, logic: 'limit_off_monthly', checked: false, visits: 1 },
                { name: '初回加算1', price: 350, logic: 'monthly', checked: false, visits: 1 },
            ],
            visit_rehab: [{ name: '訪問リハ1', price: 308, logic: 'base', checked: true, visits: 4 }],
            day_care: [], day_rehab: [], short_stay: [], welfare_equipment: []
        };

        const typeLabels = { 'home_help': '訪問介護', 'visit_nursing': '訪問看護', 'visit_rehab': '訪問リハビリ', 'day_care': '通所介護', 'day_rehab': '通所リハ', 'short_stay': '短期入所生活介護', 'welfare_equipment': '福祉用具' };
        const logicConfig = {
            'base': { title: '🟦 基本サービス (回数乗算)', color: 'text-blue-700', bg: 'bg-blue-50', border: 'border-blue-500' },
            'deduction': { title: '🟥 減算項目 (基本から割合で減算)', color: 'text-red-700', bg: 'bg-red-50', border: 'border-red-500' },
            'monthly': { title: '🟩 加算項目 (月額定額)', color: 'text-green-700', bg: 'bg-green-50', border: 'border-green-500' },
            'treatment': { title: '🟧 処遇改善 (対象外・所定単位に乗算)', color: 'text-orange-700', bg: 'bg-orange-50', border: 'border-orange-500' },
            'limit_off_base': { title: '🟧 限度額対象外 (回数乗算)', color: 'text-orange-700', bg: 'bg-orange-50', border: 'border-orange-500' },
            'limit_off_monthly': { title: '🟧 限度額対象外 (月額定額)', color: 'text-orange-700', bg: 'bg-orange-50', border: 'border-orange-500' }
        };

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'dash') updateDashboard();
            if(tabId === 'settings') renderMaster();
        }

        function adjustVal(id, amount) {
            const el = document.getElementById(id);
            el.value = Math.max(0, parseInt(el.value) + amount);
            updateVisitCount();
        }

        function updateVisitCount() {
            const type = document.getElementById('calc-type').value;
            const val = parseInt(document.getElementById('input-visit-count').value) || 0;
            masterData[type].forEach(item => {
                if(item.logic === 'base' || item.logic === 'limit_off_base') item.visits = val;
            });
            calculate();
        }

        function toggleCheck(type, idx) {
            masterData[type][idx].checked = !masterData[type][idx].checked;
            calculate(); renderCalcItems();
        }

        function renderCalcItems() {
            const type = document.getElementById('calc-type').value;
            const container = document.getElementById('calc-items-container');
            document.getElementById('service-input-label').innerText = `${typeLabels[type]}：月間利用回数`;
            const firstBase = masterData[type].find(i => i.logic === 'base');
            document.getElementById('input-visit-count').value = firstBase ? firstBase.visits : 0;
            container.innerHTML = '';
            const order = ['base', 'deduction', 'monthly', 'treatment', 'limit_off_base', 'limit_off_monthly'];
            order.forEach(logicType => {
                const items = masterData[type].map((item, idx) => ({...item, idx})).filter(i => i.logic === logicType);
                if(items.length === 0) return;
                const groupDiv = document.createElement('div');
                const conf = logicConfig[logicType];
                let html = `<h3 class="text-xs font-black ${conf.color} mb-2 border-b-2 ${conf.border} pb-1">${conf.title}</h3><div class="space-y-2 mb-4">`;
                items.forEach(item => {
                    const priceDisp = (logicType === 'deduction' || logicType === 'treatment') ? `${(item.price * 100).toFixed(1)}%` : `${item.price}単位`;
                    html += `<div onclick="toggleCheck('${type}', ${item.idx})" class="flex items-center justify-between p-3 border-2 rounded-xl cursor-pointer transition-colors ${item.checked ? conf.bg + ' ' + conf.border : 'bg-white border-slate-100'}">
                        <div class="flex items-center gap-3"><input type="checkbox" class="w-5 h-5 accent-teal-600" ${item.checked ? 'checked' : ''} readOnly><span class="font-bold text-sm text-slate-700">${item.name}</span></div>
                        <span class="text-xs font-black text-slate-500">${priceDisp}</span></div>`;
                });
                html += '</div>'; groupDiv.innerHTML = html; container.appendChild(groupDiv);
            });
        }

        function calculate() {
            const ratio = parseFloat(document.getElementById('user-ratio').value);
            const unitPrice = parseFloat(document.getElementById('care-unit-price').value);
            const limit = parseInt(document.getElementById('care-level').value);
            let limitOnUnitsTotal = 0; let limitOffUnitsTotal = 0;
            Object.keys(masterData).forEach(type => {
                let baseTotal = 0, monthlyTotal = 0, deductRate = 0, treatRate = 0, offTotal = 0;
                masterData[type].forEach(item => {
                    if(item.checked) {
                        if(item.logic === 'base') baseTotal += (item.price * (item.visits || 0));
                        if(item.logic === 'monthly') monthlyTotal += item.price;
                        if(item.logic === 'deduction') deductRate += item.price;
                        if(item.logic === 'treatment') treatRate += item.price;
                        if(item.logic === 'limit_off_base') offTotal += (item.price * (item.visits || 0));
                        if(item.logic === 'limit_off_monthly') offTotal += item.price;
                    }
                });
                const deductUnits = Math.floor(baseTotal * deductRate);
                const shoteiUnits = (baseTotal - deductUnits) + monthlyTotal;
                limitOnUnitsTotal += shoteiUnits;
                const treatmentUnits = Math.floor(shoteiUnits * treatRate);
                limitOffUnitsTotal += (treatmentUnits + offTotal);
            });
            const isOver = limitOnUnitsTotal > limit;
            document.getElementById('fixed-total-units').innerText = limitOnUnitsTotal.toLocaleString() + ' 単位';
            document.getElementById('fixed-alert').classList.toggle('hidden', !isOver);
            document.getElementById('over-alert-main').classList.toggle('hidden', !isOver);
            const grandTotalUnits = limitOnUnitsTotal + limitOffUnitsTotal;
            const userTotal = Math.floor(Math.round(grandTotalUnits * unitPrice) * ratio);
            document.getElementById('fixed-user-cost').innerText = `¥${userTotal.toLocaleString()}`;
            document.getElementById('calc-process').innerText = `(内訳) 管理対象:${limitOnUnitsTotal} + 対象外(処遇含):${limitOffUnitsTotal}`;
        }

        function updateDashboard() {
            const lightP = parseInt(document.getElementById('input-light').value) || 0;
            const heavyP = parseInt(document.getElementById('input-heavy').value) || 0;
            const ratio = parseInt(document.getElementById('slide-ratio').value);
            const fixedCost = parseInt(document.getElementById('input-fixed').value) || 0;
            const avgPrice = (lightP * (ratio/100)) + (heavyP * ((100-ratio)/100));
            const bep = avgPrice > 0 ? Math.ceil(fixedCost / avgPrice) : 0;
            const target = avgPrice > 0 ? Math.ceil((fixedCost * 1.25) / avgPrice) : 0;
            document.getElementById('bep-count').innerText = `${bep.toLocaleString()}件`;
            document.getElementById('target-count').innerText = `${target.toLocaleString()}件`;
            document.getElementById('val-ratio').innerText = `${ratio}% : ${100-ratio}%`;
            const ctx = document.getElementById('bepChart').getContext('2d');
            if(window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, { type: 'line', data: { labels: [0, bep, target, target*1.2].map(l => Math.round(l) + '件'), datasets: [{ label: '売上', data: [0, bep, target, target*1.2].map(l => l * avgPrice), borderColor: '#0d9488', backgroundColor: 'rgba(13, 148, 136, 0.1)', fill: true, tension: 0.3 }, { label: '固定費', data: new Array(4).fill(fixedCost), borderColor: '#ef4444', borderDash: [5, 5] }] }, options: { plugins: { legend: { display: false } } } });
        }

        function renderMaster() {
            const container = document.getElementById('master-list-container');
            container.innerHTML = '<h3 class="text-xl font-black mb-4">📋 登録済みマスタ</h3>';
            Object.keys(masterData).forEach(type => {
                const header = document.createElement('div');
                header.className = 'bg-slate-200 p-2 mt-4 font-black text-xs rounded text-slate-600';
                header.innerText = typeLabels[type]; container.appendChild(header);
                masterData[type].forEach((item, idx) => {
                    const d = document.createElement('div'); d.className = 'flex justify-between items-center bg-white p-4 border-b';
                    d.innerHTML = `<div><span class="text-sm font-bold block">${item.name}</span><span class="text-[10px] text-gray-500">${item.price}単位/割合</span></div><button onclick="deleteItem('${type}', ${idx})" class="text-red-500 font-bold text-sm">削除</button>`;
                    container.appendChild(d);
                });
            });
        }

        function addItem() {
            const type = document.getElementById('new-type').value;
            const name = document.getElementById('new-name').value;
            const priceVal = parseFloat(document.getElementById('new-price').value);
            const logic = document.getElementById('new-logic').value;
            if(!name || isNaN(priceVal)) return alert("数値を入力してください");
            masterData[type].push({ name, price: priceVal, logic, checked: false, visits: 0 });
            renderMaster(); renderCalcItems();
        }

        function deleteItem(type, idx) {
            if(confirm('削除しますか？')) { masterData[type].splice(idx, 1); renderMaster(); renderCalcItems(); calculate(); }
        }

        window.onload = () => { 
            renderCalcItems(); updateDashboard(); calculate(); 
            document.getElementById('print-date').innerText = new Date().toLocaleDateString(); 
            initSignaturePad('sig-user');
            initSignaturePad('sig-staff');
        };
    </script>
</body>
</html>
